<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boys Guard | Premium Underwear</title>
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #e63946;
            --text-light: #ffffff;
            --bg-light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--primary-color);
        }

        header {
            background-color: var(--primary-color);
            color: var(--text-light);
            padding: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .product-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .price-tag {
            font-size: 1.5rem;
            margin: 15px 0;
        }

        .old-price {
            text-decoration: line-through;
            color: #888;
            margin-right: 10px;
        }

        .new-price {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 2rem;
        }

        .shipping-info {
            background: #eee;
            padding: 10px;
            border-radius: 5px;
            margin: 15px 0;
            font-size: 0.9rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        input, select {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        .order-btn {
            background-color: var(--accent-color);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .order-btn:hover {
            background-color: #c12e3a;
        }
    </style>
</head>
<body>

<header>
    <h1>Boys Guard</h1>
</header>

<div class="container">
    <img src="YOUR_IMAGE_URL_HERE" alt="Boys Guard Premium Underwear" class="product-image">

    <h2>Premium Comfort Underwear</h2>
    <p>Experience the ultimate comfort and durability with Boys Guard. Designed for the modern man.</p>

    <div class="price-tag">
        <span class="old-price">600 TK</span>
        <span class="new-price">399 TK</span>
    </div>

    <div class="shipping-info">
        <strong>Delivery Charge:</strong><br>
        Inside Dhaka: 60 TK | Outside Dhaka: 80 TK
    </div>

    <hr>

    <h3>Order Form</h3>
    <form id="orderForm">
        <input type="text" name="name" placeholder="Apnar Naam" required>
        <input type="tel" name="phone" placeholder="Mobile Number" required>
        <input type="text" name="address" placeholder="Full Address" required>
        
        <select name="location" id="location" required>
            <option value="" disabled selected>Delivery Area Select Korun</option>
            <option value="Inside Dhaka">Inside Dhaka (60 TK)</option>
            <option value="Outside Dhaka">Outside Dhaka (80 TK)</option>
        </select>

        <button type="submit" class="order-btn">Order Confirm Korun</button>
    </form>
</div>

<script>
    const scriptURL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE'
    const form = document.getElementById('orderForm')

    form.addEventListener('submit', e => {
      e.preventDefault()
      fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => alert('Dhonnobad! Apnar order ti neya hoyeche.'))
        .catch(error => console.error('Error!', error.message))
    })
</script>

</body>
</html>
