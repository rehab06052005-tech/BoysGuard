<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boys Guard | প্রিমিয়াম আন্ডারওয়্যার</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; }
        header { background: #000; color: #fff; text-align: center; padding: 20px; font-size: 30px; font-weight: bold; text-transform: uppercase; }
        .top-notice { background: #e63946; color: #fff; text-align: center; padding: 10px; font-weight: bold; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        /* Boro Image Gallery */
        .product-gallery img { width: 100%; height: auto; border-radius: 8px; margin-bottom: 15px; display: block; }
        
        .price-card { background: #fff5f5; padding: 20px; border-radius: 8px; border: 1px solid #ffcccc; text-align: center; margin: 20px 0; }
        .old-price { text-decoration: line-through; color: #777; font-size: 20px; }
        .new-price { color: #e63946; font-size: 35px; font-weight: bold; display: block; }
        .view-alert { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 15px; }

        /* Form */
        .form-box { background: #f9f9f9; padding: 20px; border-radius: 10px; border: 1px solid #ddd; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .order-btn { background: #e63946; color: #fff; width: 100%; padding: 20px; border: none; border-radius: 5px; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .order-btn:hover { background: #c12e3a; }
        .call-btn { display: block; background: #25d366; color: #fff; text-align: center; padding: 15px; text-decoration: none; border-radius: 5px; margin-top: 15px; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

<div class="top-notice">🔥 সীমিত সময়ের অফার! ৩৯৯ টাকায় ১ সেট (৩ পিস)</div>
<header>Boys Guard</header>

<div class="container">
    <div class="view-alert">👀 বর্তমানে ২০+ লোক এই প্রোডাক্টটি দেখছেন!</div>

    <div class="product-gallery">
        <img src="https://scontent.fdac183-1.fna.fbcdn.net/v/t39.30808-6/657363635_122107302074384740_5174565293077104559_n.jpg?_nc_cat=103&ccb=1-7&_nc_sid=7b2446&_nc_eui2=AeFApdq7xxqG12TaAXOH12Wzelb8XeqB4Sx6Vvxd6oHhLJWlXRJqXC6-4jfy-_QR1RssI96d6NMszqUlQ7pLa9qI&_nc_ohc=l9x596RiuJ4Q7kNvwEfzRL0&_nc_oc=AdqG5DDBgORy_Ly0j4SVP9Htf828LEjIFev7RMc7oZT43zm3-AT57IhFahIohuDcHXk&_nc_zt=23&_nc_ht=scontent.fdac183-1.fna&_nc_gid=CvnhzOi0H41ZY4WxnzHiEA&_nc_ss=7a3a8&oh=00_Af0wBfYTvbPLmZVZO05zwJGGNXtPbd2X4Zp8n2burvggJw&oe=69E317A6" alt="Boys Guard Underwear 1">
        <img src="https://scontent.fdac183-1.fna.fbcdn.net/v/t39.30808-6/657475410_122107301990384740_3347600214081485893_n.jpg?_nc_cat=105&ccb=1-7&_nc_sid=7b2446&_nc_eui2=AeFduINZIanqD_pbP8z6W1DTZbHXAMLkUQNlsdcAwuRRA9hbr_MkIv-LtROWT3RSTmJt4WDOAKiWmv_Jm9aDoivU&_nc_ohc=HU9GNBBIbUgQ7kNvwHPMGkR&_nc_oc=AdqpXKZDMnS14QrXaFLp4k5t6FGWcMPREpgK3YjKls33Z86bLCQ4DH3pWu5JdFM4w6Y&_nc_zt=23&_nc_ht=scontent.fdac183-1.fna&_nc_gid=CvnhzOi0H41ZY4WxnzHiEA&_nc_ss=7a3a8&oh=00_Af0yzVYw8TWm_uPChZByR0j9x6dqX1UaakFSX2LliRe7Xw&oe=69E30AB6" alt="Boys Guard Underwear 2">
        <img src="https://scontent.fdac183-1.fna.fbcdn.net/v/t39.30808-6/658125175_122107301930384740_1333179212776249875_n.jpg?_nc_cat=105&ccb=1-7&_nc_sid=7b2446&_nc_eui2=AeFDCGQthrtVo6Mb91HOGfsXjmQ2Fr9rIMqOZDYWv2sgyosEs8MLrZO6OftWU_2R94HCfAcfwg9JrkTDneU19B-f&_nc_ohc=_si-yiGG06wQ7kNvwENW9mA&_nc_oc=Adrl7wIFw6RvNirndTwUe7_kPxwOnJJFjZwcJ4p3p5i3xH0i8aFso24XDt9fgRWsfME&_nc_zt=23&_nc_ht=scontent.fdac183-1.fna&_nc_gid=CvnhzOi0H41ZY4WxnzHiEA&_nc_ss=7a3a8&oh=00_Af0fd-X7mFi3TSDzHW9EF1G2-6ptjWj0nvqpLFtFsV_c7w&oe=69E31873" alt="Boys Guard Underwear 3">
    </div>

    <div class="price-card">
        <span class="old-price">পূর্বের মূল্য: ৬০০ টাকা</span>
        <span class="new-price">অফার মূল্য: ৩৯৯ টাকা</span>
        <p style="color: red; font-weight: bold;">⚠️ মাত্র অল্প কিছু স্টক বাকি আছে!</p>
    </div>

    <div class="form-box">
        <h3 style="text-align: center;">অর্ডার করতে নিচের ফর্মটি পূরণ করুন</h3>
        <form id="orderForm">
            <input type="text" name="name" placeholder="আপনার নাম" required>
            <input type="tel" name="phone" placeholder="মোবাইল নম্বর" required>
            
            <select name="size" required>
                <option value="">সাইজ সিলেক্ট করুন</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
                <option value="XXL">XXL</option>
            </select>

            <input type="text" name="area" placeholder="এলাকা / গ্রাম / রাস্তা নম্বর" required>
            <input type="text" name="thana" placeholder="থানা" required>
            <input type="text" name="district" placeholder="জেলা" required>

            <select name="delivery" required>
                <option value="Inside Dhaka">ঢাকার ভিতরে (৬০ টাকা)</option>
                <option value="Outside Dhaka">ঢাকার বাইরে (৮০ টাকা)</option>
            </select>

            <button type="submit" class="order-btn" id="submitBtn">অর্ডার কনফার্ম করুন</button>
        </form>
        <a href="tel:01872720582" class="call-btn">📞 সরাসরি কল করুন</a>
    </div>
</div>

<script>
    // Apnar Apps Script URL eikhane bosiyechi
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxhby7E7OBTyNpJDlXuhnlmvPPfvt4fruaMA7LXfAFv6hPBqQIP0xA6OszE_Vw1rzTD/exec';
    const form = document.getElementById('orderForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
      e.preventDefault();
      btn.disabled = true;
      btn.innerText = "অর্ডার প্রসেসিং হচ্ছে...";

      fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => {
            alert('ধন্যবাদ! আপনার অর্ডারটি সফলভাবে গ্রহণ করা হয়েছে। আমরা শীঘ্রই যোগাযোগ করবো।');
            form.reset();
            btn.disabled = false;
            btn.innerText = "অর্ডার কনফার্ম করুন";
        })
        .catch(error => {
            alert('দুঃখিত! আবার চেষ্টা করুন।');
            btn.disabled = false;
            btn.innerText = "অর্ডার কনফার্ম করুন";
        });
    });
</script>

</body>
</html>
